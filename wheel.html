<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="./assets/css/style.css">

</head>
<body>
    <div class="container-fluid">
        <div class="container">
            <header class="d-flex">
                <img src="./assets/img/tingua-removebg-preview (1) 1.png" alt="">
                <div class="d-flex justify-content-end contend_header">
                    <div class="search">
                        <input type="text" placeholder="Agregar Nombre">

                    </div>
                </div>
            </header>
            <div class="row">
                <div class="col-lg-3">
                    <div class="seccion_lista1">
                        <img src="./assets/img/image 2.png" alt="img_1">
                    </div>
                    <article class="list-names">
                        <div class="d-flex">
                            <ul id="add_list">
                                
                            </ul>
                        </div>
                    </article>
                </div>
                <div class="col-lg-3">
                    <div class="seccion_lista1">

                    </div>
                    <article>

                        </ul>
                    </article>
                </div>
                <div class="col-lg-6">
                    <div class="space-btn">
                        <button class="btn" id="sorteo">SORTEO</button>

                    </div>
                    <div class="content_dinamic">
                        <img src="./assets/img/tingua-removebg-preview 1.png" alt="">
                    </div>
                    <div class="space-btn">
                        <button class="btn" id="eliminar">ELIMINAR</button>
                        <button class="btn" id="proxima">PROXIMA PERSONA</button>
                    </div>
                </div>
            </div>
            <div>
                <div id="modal" class="modal-container">
                    <div class="modal-content">
                        <img src="./assets/img/tingua1.jpg" alt="">
                        <div id="close" class="close">
                            <p>Cerrar</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/custom.js"></script>
    <script src="./assets/js/jquery.min.js"></script>
    <script src="./assets/js/example.js"></script>
